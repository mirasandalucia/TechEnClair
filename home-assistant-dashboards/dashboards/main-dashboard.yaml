title: TechEnClair
views:
  - title: Accueil
    path: accueil
    theme: TechEnClair
    cards:
      - type: vertical-stack
        cards:
          - type: heading
            heading: Maison en un coup d'oeil
          - type: grid
            columns: 3
            cards:
              - type: mushroom-person-card
                entity: person.tech
                name: Tech
              - type: mushroom-entity-card
                entity: weather.home
                name: Météo
              - type: mushroom-entity-card
                entity: sensor.internet_status
                name: Réseau
          - type: grid
            columns: 2
            cards:
              - type: mushroom-light-card
                entity: light.salon
                name: Salon
              - type: mushroom-light-card
                entity: light.cuisine
                name: Cuisine
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.energy_today_kwh
                name: Énergie jour
                min: 0
                max: 25
              - type: gauge
                entity: sensor.power_now_w
                name: Puissance
                min: 0
                max: 4000
      - type: entities
        title: Sécurité
        entities:
          - alarm_control_panel.home_alarm
          - binary_sensor.door_front
          - binary_sensor.window_kitchen
          - binary_sensor.motion_hall
