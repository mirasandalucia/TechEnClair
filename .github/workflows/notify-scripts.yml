name: Notify Discord on New Script

on:
  push:
    paths:
      - 'scripts/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for tj-actions/changed-files to compare

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: scripts/**

      - name: Debug - List Added Files
        run: |
          echo "All changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Added files: ${{ steps.changed-files.outputs.added_files }}"
          echo "Modified files: ${{ steps.changed-files.outputs.modified_files }}"

      - name: Check Secret availability
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::error::Le secret DISCORD_WEBHOOK est vide ou n'est pas configuré dans les paramètres du dépôt !"
            exit 1
          fi
          echo "Le secret est bien présent."

      - name: Send Discord Notification
        if: steps.changed-files.outputs.added_files != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Branded color (light blue)
          COLOR=3447003 
          
          # Prepare the file list for the embed
          FILES="${{ steps.changed-files.outputs.added_files }}"
          # Safely escape filenames for JSON and format list
          FILES_FORMATTED=$(echo "$FILES" | tr ' ' '\n' | sed 's/^/- /' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          # Construct the JSON payload using a temporary file for safety
          cat <<EOF > payload.json
          {
            "thread_name": "🚀 Nouveaux scripts : $(date +'%d/%m %H:%M')",
            "embeds": [
              {
                "title": "🚀 Nouveau script ajouté !",
                "description": "Les fichiers suivants ont été ajoutés au dossier \`scripts/\` :\n\n$FILES_FORMATTED",
                "color": $COLOR,
                "author": {
                  "name": "${{ github.actor }}",
                  "icon_url": "https://github.com/${{ github.actor }}.png"
                },
                "footer": {
                  "text": "TechEnClair - GitHub Actions"
                },
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          EOF
          
          # Send to Discord (silent mode + show error if fails)
          RESPONSE=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" \
               -d @payload.json \
               "$DISCORD_WEBHOOK")
          
          HTTP_CODE=${RESPONSE: -3}
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Discord API renvoyé une erreur (Code: $HTTP_CODE)"
            echo "Réponse: ${RESPONSE%???}"
            exit 1
          fi
          echo "Notification envoyée avec succès (Code: $HTTP_CODE)."
